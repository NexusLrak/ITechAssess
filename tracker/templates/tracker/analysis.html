{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Charts</title>

    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            padding: 10px 12px;
        }

        #charts {
            display: grid;
            grid-template-rows: 0.75fr 1.00fr;
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .chart-card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            background: #fff;
            padding: 8px;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }

        .chart {
            width: 100%;
            height: 100%;
        }

        @media (max-width: 768px) {

            html,
            body {
                height: auto;
                overflow: auto;
            }

            #charts {
                grid-template-rows: auto auto;
                height: auto;
            }

            .chart-card:first-child {
                min-height: 320px;
            }

            .chart-card:last-child {
                min-height: 240px;
            }
        }
    </style>
</head>

<body>
    <div id="charts">
        <div class="chart-card">
            <div id="pie-chart" class="chart"></div>
        </div>
        <div class="chart-card">
            <div id="bar-chart" class="chart"></div>
        </div>
    </div>

    <script src="{% static 'tracker/js/analysis.js' %}"></script>
</body>

</html>
